<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Calculator By MarquisWuan</title>
  
  <!-- Style -->
<link rel="stylesheet" href="css/style.css">
<!--  Fonts  -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"

        />

<body>
  
  <h3>Calculator</h3>

<!-- Layar -->
<p> <b id="hasil">0</b></p>


<input type="number" id="angka1" placeholder="0">
<br><br>
<input type="number" id="angka2" placeholder="0">
<br><br>

<button onclick="tambah()">+</button>

<button onclick="kurang()">-</button>

<button onclick="kali()">×</button>

<button onclick="bagi()">÷</button>

<button onclick="hapusSemua()" class="btn-ac">AC</button>
<br>
<button onclick="toggleDarkMode()" id="btn-dark">Dark</button>

<h4>Calculation History:</h4>
<div id="history-container" style="text-align: left; padding: 10px; border: 1px solid #ccc; border-radius: 8px; background: #fff; color: #000; min-height: 50px;">
    <ul id="history-list"></ul>
</div>


  <script src="js/script.js"></script>
</body>
</html>
